# Workflow name for the frontend continuous deployment pipeline
name: Continuous Deployment

# Triggers for the workflow
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Define jobs in the workflow
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Check out the code from the repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Configure AWS credentials using GitHub Secrets for secure access
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: AKIAXYKJRKBBNMFDED5U
          aws-secret-access-key: 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
          aws-region: us-east-1

      # Update kubeconfig to authenticate to the EKS cluster
      - name: Update kubeconfig for EKS
        run: aws eks --region us-east-1 update-kubeconfig --name cluster

      # Set up Helm and install PostgreSQL using the Bitnami Helm Chart
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Add Bitnami Helm Repository
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      # Apply Persistent Volume and PVC configurations
      - name: Apply PVC and PV
        run: |
          kubectl apply -f db/pv.yaml
          kubectl apply -f db/pvc.yaml

      
      # Deploy PostgreSQL (If you have any additional configurations)
      - name: Deploy PostgreSQL
        run: kubectl apply -f db/postgresql-deployment.yaml

          
    # Retrieve the PostgreSQL password and export it as an environment variable
      - name: Retrieve PostgreSQL Password
        id: get-postgres-password
        run: |
          export POSTGRES_PASSWORD=$(kubectl get secret --namespace default coworking-db-postgresql -o jsonpath="{.data.postgres-password}" | base64 -d)
          echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> $GITHUB_ENV

      # Check PostgreSQL Pod Status and Wait for It to Be Ready
      - name: Wait for PostgreSQL Pod to Be Ready
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=postgresql --timeout=300s -n default
          kubectl get pods -n default

      # Apply Seed Files using kubectl exec to access PostgreSQL pod and run multiple SQL files
      - name: Run SQL Commands Inside PostgreSQL Pod
        env:
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          POD_NAME=$(kubectl get pods -n default -l app.kubernetes.io/name=postgresql -o jsonpath="{.items[0].metadata.name}")
          kubectl exec $POD_NAME -n default -- bash -c "PGPASSWORD=\"$POSTGRES_PASSWORD\" psql postgres://postgres@localhost:5432/postgres -f /db/_create_tables.sql"
          kubectl exec $POD_NAME -n default -- bash -c "PGPASSWORD=\"$POSTGRES_PASSWORD\" psql postgres://postgres@localhost:5432/postgres -f /db/_seed_use.sql"
          kubectl exec $POD_NAME -n default -- bash -c "PGPASSWORD=\"$POSTGRES_PASSWORD\" psql postgres://postgres@localhost:5432/postgres -f /db/_seed_token.sql"

      # Verify that PostgreSQL is running
      - name: Get Service URLs
        run: kubectl get svc -A

      - name: Get Service Pods
        run: kubectl get pods -A
